backend:
  name: github
  repo: sibakom-dev/sibaagromandiri
  branch: main

local_backend: true

media_folder: "siba-agro-id/src/assets"
public_folder: "/assets"

collections:
  - name: "pages"
    label: "Halaman"
    files:
      - file: "siba-agro-id/src/index.md"
        label: "Beranda"
        name: "home"
        fields:
          - { label: "Template Layout", name: "layout", widget: "hidden", default: "layouts/home.njk" }
          - label: "SEO Metadata"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Meta Title", name: "title", widget: "string", required: false }
              - { label: "Meta Description", name: "description", widget: "text", required: false }
              - { label: "Social Image", name: "image", widget: "image", required: false }
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "CTA Text", name: "cta_text", widget: "string" }
              - { label: "CTA Link", name: "cta_link", widget: "string" }
              - { label: "Primary Image", name: "image_primary", widget: "image" }
              - { label: "Logo Image", name: "image_logo", widget: "image" }

      - file: "siba-agro-id/src/tentang-kami.md"
        label: "Tentang Kami"
        name: "about"
        fields:
          - { label: "Template Layout", name: "layout", widget: "hidden", default: "layouts/about.njk" }
          - label: "SEO Metadata"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Meta Title", name: "title", widget: "string", required: false }
              - { label: "Meta Description", name: "description", widget: "text", required: false }
              - { label: "Social Image", name: "image", widget: "image", required: false }
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "Content", name: "body", widget: "markdown", required: false }
          - label: "Images"
            name: "images"
            widget: "list"
            fields:
              - { label: "Image", name: "image", widget: "image" }

      - file: "siba-agro-id/src/produk.md"
        label: "Produk Kami"
        name: "product"
        fields:
          - { label: "Template Layout", name: "layout", widget: "hidden", default: "layouts/product.njk" }
          - label: "SEO Metadata"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Meta Title", name: "title", widget: "string", required: false }
              - { label: "Meta Description", name: "description", widget: "text", required: false }
              - { label: "Social Image", name: "image", widget: "image", required: false }
          - { label: "Page Title", name: "title", widget: "string" }
          - label: "Products List"
            name: "products"
            widget: "list"
            fields:
              - { label: "Product Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image", required: false }

      - file: "siba-agro-id/src/galeri.md"
        label: "Galeri"
        name: "gallery"
        fields:
          - { label: "Template Layout", name: "layout", widget: "hidden", default: "layouts/gallery.njk" }
          - label: "SEO Metadata"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Meta Title", name: "title", widget: "string", required: false }
              - { label: "Meta Description", name: "description", widget: "text", required: false }
              - { label: "Social Image", name: "image", widget: "image", required: false }
          - { label: "Page Title", name: "title", widget: "string" }
          - label: "Gallery Images"
            name: "gallery_images"
            widget: "list"
            fields:
              - { label: "Image", name: "image", widget: "image" }

      - file: "siba-agro-id/src/hubungi-kami.md"
        label: "Hubungi Kami"
        name: "contact"
        fields:
          - { label: "Template Layout", name: "layout", widget: "hidden", default: "layouts/contact.njk" }
          - label: "SEO Metadata"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Meta Title", name: "title", widget: "string", required: false }
              - { label: "Meta Description", name: "description", widget: "text", required: false }
              - { label: "Social Image", name: "image", widget: "image", required: false }
          - { label: "Page Title", name: "title", widget: "string" }
          - label: "Contact Details"
            name: "contact_details"
            widget: "object"
            fields:
              - { label: "Address", name: "address", widget: "text" }
              - { label: "Phone", name: "phone", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }

  - name: "products"
    label: "Produk"
    folder: "siba-agro-id/src/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Short Description", name: "description", widget: "text" }
      - { label: "Product Image", name: "image", widget: "image" }
      - { label: "Full Description", name: "body", widget: "markdown" }

  - name: "features"
    label: "Fitur"
    folder: "siba-agro-id/src/features"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Short Description", name: "description", widget: "text" }
      - { label: "Full Description", name: "body", widget: "markdown" }

  - name: "settings"
    label: "Pengaturan"
    files:
      - name: "cta"
        label: "Popup CTA"
        file: "siba-agro-id/src/_data/cta.json"
        fields:
          - {label: "Tampilkan Popup", name: "enabled", widget: "boolean", default: true}
          - {label: "Judul", name: "title", widget: "string"}
          - {label: "Deskripsi", name: "description", widget: "text"}
          - {label: "Teks Tombol", name: "button_text", widget: "string"}
          - {label: "Link Tombol", name: "button_link", widget: "string"}
          - {label: "Gambar", name: "image", widget: "image"}
